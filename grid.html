<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Projection Grid - Visual Presets</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        
        .info-key {
            position: absolute; top: 20px; right: 20px;
            background: #1e1e1e; padding: 15px; border-radius: 8px;
            border: 1px solid #333; font-size: 0.85rem; line-height: 1.4;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .info-key h4 { margin: 0 0 8px 0; color: #3498db; text-transform: uppercase; letter-spacing: 1px; }
        .info-key ul { list-style: none; padding: 0; margin: 0; }
        .key-code { font-family: monospace; font-weight: bold; color: #fff; background: #333; padding: 2px 4px; border-radius: 3px; }

        .toolbar { 
            display: flex; flex-direction: column; gap: 15px; 
            background: #1e1e1e; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 25px;
            border: 1px solid #333; width: 550px;
        }

        .tool-section { display: flex; align-items: center; justify-content: space-between; }
        .options { display: flex; gap: 8px; flex-wrap: wrap; }

        .opt-btn {
            padding: 8px 12px; border-radius: 6px; border: 2px solid #444;
            background: #333; color: white; cursor: pointer; font-weight: bold;
            transition: 0.2s;
        }
        .opt-btn.active { border-color: #fff; background: #555; transform: scale(1.05); }

        .swatch { width: 35px; height: 35px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: 0.2s; }
        .swatch.active { border-color: #3498db; transform: scale(1.1); }

        .grid { 
            display: grid; grid-template-columns: repeat(8, 55px); 
            grid-template-rows: repeat(8, 55px); gap: 6px; 
            background: #252525; padding: 12px; border-radius: 8px;
        }
        .cell {
            width: 55px; height: 55px; display: flex; align-items: center; justify-content: center;
            background: #2a2a2a; border-radius: 4px; cursor: pointer;
            font-weight: bold; font-size: 1.1rem; border: 1px solid #333; transition: 0.1s;
        }

        .button-group { display: flex; gap: 15px; margin-top: 25px; }
        button.action-btn { padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .export-btn { background: #27ae60; color: white; }
        .clear-btn { background: #c0392b; color: white; }
    </style>
</head>
<body>

    <div class="info-key">
        <h4>Grid Key</h4>
        <ul>
            <li><strong>Levels:</strong> <span class="key-code">0-3</span></li>
            <hr style="border:0; border-top:1px solid #333; margin: 8px 0;">
            <li><span class="key-code">w/k</span>: White/Black</li>
            <li><span class="key-code">r/g/b</span>: RGB</li>
            <li><span class="key-code">y/o</span>: Yel/Ora</li>
            <li><span class="key-code">u</span>: Unassigned</li>
        </ul>
    </div>

    <h2>Projection Grid Painter</h2>

    <div class="toolbar">
        <div class="tool-section">
            <span>Presets:</span>
            <div class="options">
                <button class="opt-btn" onclick="loadPreset('chess')">Chess Board</button>
                <button class="opt-btn" onclick="loadPreset('pyramid')">3D Pyramid</button>
                <button class="opt-btn" onclick="loadPreset('wave')">Ripple Wave</button>
            </div>
        </div>

        <div class="tool-section">
            <span>Brush Height:</span>
            <div class="options" id="height-options">
                <button class="opt-btn active" data-val="0">0</button>
                <button class="opt-btn" data-val="1">1</button>
                <button class="opt-btn" data-val="2">2</button>
                <button class="opt-btn" data-val="3">3</button>
            </div>
        </div>

        <div class="tool-section">
            <span>Brush Color:</span>
            <div class="options" id="color-options">
                <div class="swatch active" style="background: #2ecc71;" data-code="g"></div>
                <div class="swatch" style="background: #e74c3c;" data-code="r"></div>
                <div class="swatch" style="background: #3498db;" data-code="b"></div>
                <div class="swatch" style="background: #f1c40f;" data-code="y"></div>
                <div class="swatch" style="background: #e67e22;" data-code="o"></div>
                <div class="swatch" style="background: #ffffff; border: 1px solid #666;" data-code="w"></div>
                <div class="swatch" style="background: #000000; border: 1px solid #666;" data-code="k"></div>
            </div>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="button-group">
        <button class="action-btn clear-btn" onclick="clearGrid()">Clear Grid</button>
        <button class="action-btn export-btn" onclick="exportToTxt()">Export grid.txt</button>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        let selectedHeight = "0";
        let selectedColor = "g";
        let state = Array.from({ length: 8 }, () => Array.from({ length: 8 }, () => ({ level: 0, color: 'u' })));

        const presets = {
            chess: () => {
                let d = [];
                const backRank = [2, 1, 1, 3, 3, 1, 1, 2];
                for(let r=0; r<8; r++) {
                    let row = [];
                    for(let c=0; c<8; c++) {
                        if (r === 0) row.push({level: backRank[c], color: 'k'});
                        else if (r === 1) row.push({level: 0, color: 'k'});
                        else if (r === 6) row.push({level: 0, color: 'w'});
                        else if (r === 7) row.push({level: backRank[c], color: 'w'});
                        else row.push({level: 0, color: 'u'});
                    }
                    d.push(row);
                }
                return d;
            },
            pyramid: () => {
                let d = [];
                for(let r=0; r<8; r++) {
                    let row = [];
                    for(let c=0; c<8; c++) {
                        // Calculate distance from edge to create concentric squares
                        let distToEdge = Math.min(r, c, 7-r, 7-c);
                        let lvl = Math.min(distToEdge, 3); // Max height of 3
                        let colors = ['w', 'y', 'o', 'r']; // Gradient from white base to red tip
                        row.push({level: lvl, color: colors[lvl]});
                    }
                    d.push(row);
                }
                return d;
            },
            wave: () => {
                let d = [];
                for(let r=0; r<8; r++) {
                    let row = [];
                    for(let c=0; c<8; c++) {
                        let dist = Math.sqrt(Math.pow(r-3.5, 2) + Math.pow(c-3.5, 2));
                        let lvl = Math.floor(Math.sin(dist - 1.2) * 1.5 + 1.5);
                        let colorMap = ['b', 'g', 'y', 'w'];
                        row.push({level: lvl, color: colorMap[lvl]});
                    }
                    d.push(row);
                }
                return d;
            }
        };

        function renderGrid() {
            gridElement.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const node = state[r][c];
                    cell.innerText = `${node.level}${node.color}`;
                    cell.style.color = getHex(node.color);
                    cell.style.borderColor = getHex(node.color);
                    cell.onclick = () => paintCell(r, c);
                    gridElement.appendChild(cell);
                }
            }
        }

        function loadPreset(name) {
            state = presets[name]();
            renderGrid();
        }

        function paintCell(r, c) {
            state[r][c] = { level: parseInt(selectedHeight), color: selectedColor };
            renderGrid();
        }

        function clearGrid() {
            if(confirm("Reset to 0u?")) {
                state = Array.from({ length: 8 }, () => Array.from({ length: 8 }, () => ({ level: 0, color: 'u' })));
                renderGrid();
            }
        }

        function getHex(code) {
            const map = { r:'#e74c3c', g:'#2ecc71', b:'#3498db', y:'#f1c40f', o:'#e67e22', w:'#ffffff', k:'#666', u:'#333' };
            return map[code];
        }

        function exportToTxt() {
            let output = state.map(row => row.map(n => `${n.level}${n.color}`).join(',')).join('\n');
            const blob = new Blob([output], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'grid.txt'; a.click();
        }

        document.querySelectorAll('#height-options .opt-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('#height-options .opt-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedHeight = btn.dataset.val;
            };
        });
        document.querySelectorAll('.swatch').forEach(s => {
            s.onclick = () => {
                document.querySelectorAll('.swatch').forEach(sw => sw.classList.remove('active'));
                s.classList.add('active');
                selectedColor = s.dataset.code;
            };
        });

        renderGrid();
    </script>
</body>
</html>
