<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Projection Grid - Dashboard</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #121212; color: #e0e0e0; 
            margin: 0; padding: 0; 
            display: flex; height: 100vh; overflow: hidden;
        }

        /* --- SIDEBAR MENU --- */
        .sidebar {
            width: 320px; background: #1e1e1e;
            border-right: 1px solid #333;
            display: flex; flex-direction: column;
            padding: 20px; box-shadow: 4px 0 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        h2 { font-size: 1.1rem; margin-top: 0; color: #3498db; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

        .tool-section { margin-bottom: 20px; }
        .tool-label { font-size: 0.7rem; color: #888; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .full-width { grid-column: span 2; }

        .opt-btn {
            padding: 8px; border-radius: 4px; border: 1px solid #444;
            background: #333; color: white; cursor: pointer; font-weight: bold;
            transition: 0.2s; font-size: 0.75rem; text-align: center;
        }
        .opt-btn:hover { border-color: #666; background: #3d3d3d; }
        .opt-btn.active { border-color: #3498db; background: #2c3e50; box-shadow: inset 0 0 5px rgba(52, 152, 219, 0.5); }

        .swatch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .swatch { width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: 0.2s; margin: auto; }
        .swatch.active { border-color: #fff; transform: scale(1.1); }

        /* Sidebar Action Buttons */
        .action-group { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
        .action-btn { 
            padding: 10px; border: none; border-radius: 6px; 
            cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.2s;
        }
        .clear-btn { background: #c0392b; color: white; }
        .clear-btn:hover { background: #e74c3c; }
        .export-btn { background: #27ae60; color: white; }
        .export-btn:hover { background: #2ecc71; }

        /* --- MAIN VIEWPORT --- */
        .viewport {
            flex-grow: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; background: #181818;
        }

        .grid { 
            display: grid; grid-template-columns: repeat(8, 55px); 
            grid-template-rows: repeat(8, 55px); gap: 6px; 
            background: #252525; padding: 12px; border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cell {
            width: 55px; height: 55px; display: flex; align-items: center; justify-content: center;
            background: #2a2a2a; border-radius: 4px; cursor: pointer;
            font-weight: bold; font-size: 1.1rem; border: 1px solid #333; transition: 0.1s;
        }
        .cell:hover { background: #333; border-color: #555; }

        .info-key {
            position: absolute; bottom: 20px; right: 20px;
            background: #1e1e1e; padding: 10px; border-radius: 6px;
            border: 1px solid #333; font-size: 0.7rem; color: #888;
        }

        /* --- CUSTOM MODAL --- */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1e1e1e; padding: 25px; border-radius: 12px;
            border: 1px solid #c0392b; width: 280px; text-align: center;
        }
        #modal-overlay.active { display: flex; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 8px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; }
        .btn-confirm { background: #c0392b; color: white; }
        .btn-cancel { background: #444; color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Grid Controller</h2>

        <div class="tool-section">
            <span class="tool-label">Geometric Presets</span>
            <div class="options">
                <button class="opt-btn" onclick="loadPreset('chess')">Chess</button>
                <button class="opt-btn" onclick="loadPreset('pyramid')">Pyramid</button>
                <button class="opt-btn" onclick="loadPreset('wave')">Wave</button>
                <button class="opt-btn" onclick="loadPreset('frame')">Frame</button>
                <button class="opt-btn" onclick="loadPreset('cross')">Crosshair</button>
                <button class="opt-btn" onclick="loadPreset('corners')">Corners</button>
            </div>
        </div>

        <div class="tool-section">
            <span class="tool-label">Data & FX Presets</span>
            <div class="options">
                <button class="opt-btn" onclick="loadPreset('scanner')">Scanner</button>
                <button class="opt-btn" onclick="loadPreset('noise')">Random Noise</button>
            </div>
        </div>

        <div class="tool-section">
            <span class="tool-label">Height Brush</span>
            <div class="options">
                <button class="opt-btn h-btn active" onclick="setHeight(0, this)">Lvl 0</button>
                <button class="opt-btn h-btn" onclick="setHeight(1, this)">Lvl 1</button>
                <button class="opt-btn h-btn" onclick="setHeight(2, this)">Lvl 2</button>
                <button class="opt-btn h-btn" onclick="setHeight(3, this)">Lvl 3</button>
            </div>
        </div>

        <div class="tool-section">
            <span class="tool-label">Color Brush</span>
            <div class="swatch-grid">
                <div class="swatch active" style="background: #2ecc71;" data-code="g" onclick="setColor('g', this)"></div>
                <div class="swatch" style="background: #e74c3c;" data-code="r" onclick="setColor('r', this)"></div>
                <div class="swatch" style="background: #3498db;" data-code="b" onclick="setColor('b', this)"></div>
                <div class="swatch" style="background: #f1c40f;" data-code="y" onclick="setColor('y', this)"></div>
                <div class="swatch" style="background: #e67e22;" data-code="o" onclick="setColor('o', this)"></div>
                <div class="swatch" style="background: #ffffff;" data-code="w" onclick="setColor('w', this)"></div>
                <div class="swatch" style="background: #000000; border:1px solid #444;" data-code="k" onclick="setColor('k', this)"></div>
            </div>
        </div>

        <div class="action-group">
            <button class="action-btn clear-btn" onclick="openModal()">Clear Grid</button>
            
            <button class="action-btn" style="background: #3498db; color: white;" onclick="connectAndSend()">Connect and Send to ESP32</button>
            <button class="action-btn" style="background: #8e44ad; color: white;" onclick="syncToESP32()">Sync to ESP32</button>
            
            <button class="action-btn export-btn" onclick="exportToTxt()">Export grid.txt</button>
        </div>
    </div>

    <div class="viewport">
        <div class="grid" id="grid"></div>
        <div class="info-key">
            8x8x4 Grid | Output: [Level][Color] | Clear resets to 0u
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <div style="font-weight: bold; margin-bottom: 10px;">Reset Grid?</div>
            <div style="font-size: 0.85rem; color: #aaa;">All unassigned cells will return to 0u.</div>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn btn-confirm" onclick="confirmClear()">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const modal = document.getElementById('modal-overlay');
        let selectedHeight = 0;
        let selectedColor = "g";
        let state = Array.from({ length: 8 }, () => Array.from({ length: 8 }, () => ({ level: 0, color: 'u' })));

        const presets = {
            chess: () => {
                let d = Array.from({length:8}, () => Array.from({length:8}, () => ({level:0, color:'u'})));
                const backRank = [2, 1, 1, 3, 3, 1, 1, 2];
                for(let c=0; c<8; c++) {
                    d[0][c] = { level: backRank[c], color: 'k' };
                    d[1][c] = { level: 0, color: 'k' };
                    d[6][c] = { level: 0, color: 'w' };
                    d[7][c] = { level: backRank[c], color: 'w' };
                }
                return d;
            },
            pyramid: () => {
                return state.map((row, r) => row.map((_, c) => {
                    let lvl = Math.min(r, c, 7-r, 7-c);
                    let color = ['w', 'y', 'o', 'r'][lvl];
                    return { level: Math.min(lvl, 3), color: color };
                }));
            },
            wave: () => {
                return state.map((row, r) => row.map((_, c) => {
                    let dist = Math.sqrt(Math.pow(r-3.5, 2) + Math.pow(c-3.5, 2));
                    let lvl = Math.floor(Math.sin(dist - 1.2) * 1.5 + 1.5);
                    return { level: lvl, color: ['b', 'g', 'y', 'w'][lvl] };
                }));
            },
            frame: () => {
                return state.map((row, r) => row.map((_, c) => {
                    let isEdge = r === 0 || r === 7 || c === 0 || c === 7;
                    return { level: isEdge ? 3 : 0, color: isEdge ? 'w' : 'u' };
                }));
            },
            cross: () => {
                return state.map((row, r) => row.map((_, c) => {
                    let isAxis = r === 3 || r === 4 || c === 3 || c === 4;
                    let isCenter = isAxis && (r >= 3 && r <= 4 && c >= 3 && c <= 4);
                    return { level: isCenter ? 3 : (isAxis ? 1 : 0), color: isAxis ? 'b' : 'u' };
                }));
            },
            corners: () => {
                return state.map((row, r) => row.map((_, c) => {
                    let isCorner = (r < 2 || r > 5) && (c < 2 || c > 5);
                    return { level: isCorner ? 2 : 0, color: isCorner ? 'r' : 'u' };
                }));
            },
            scanner: () => {
                return state.map((row, r) => row.map((_, c) => {
                    let isLine = r === 3 || r === 4;
                    return { level: isLine ? 3 : 0, color: isLine ? 'g' : 'u' };
                }));
            },
            noise: () => {
                const colors = ['r', 'g', 'b', 'y', 'o', 'w'];
                return state.map(row => row.map(() => ({
                    level: Math.floor(Math.random() * 4),
                    color: colors[Math.floor(Math.random() * colors.length)]
                })));
            }
        };

        function setHeight(val, btn) {
            selectedHeight = val;
            document.querySelectorAll('.h-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function setColor(code, el) {
            selectedColor = code;
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        }

        let isDrawing = false; // Track if mouse is held down

// Listen for mouse events on the window to stop drawing if the mouse leaves the grid
window.addEventListener('mousedown', () => isDrawing = true);
window.addEventListener('mouseup', () => isDrawing = false);

function renderGrid() {
    gridElement.innerHTML = '';
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            const node = state[r][c];
            
            cell.innerText = `${node.level}${node.color}`;
            cell.style.color = getHex(node.color);
            cell.style.borderColor = node.color === 'u' ? '#333' : getHex(node.color);

            // Update the updateCell function inside renderGrid()
const updateCell = () => {
    state[r][c] = { level: selectedHeight, color: selectedColor };
    
    // Update the visual UI
    cell.innerText = `${selectedHeight}${selectedColor}`;
    cell.style.color = getHex(selectedColor);
    cell.style.borderColor = getHex(selectedColor);
    };

            // CLICK to paint a single dot
            cell.onmousedown = (e) => {
                e.preventDefault(); // Prevent text selection while dragging
                updateCell();
            };

            // HOVER + MOUSE DOWN to drag paint
            cell.onmouseenter = () => {
                if (isDrawing) {
                    updateCell();
                }
            };

            gridElement.appendChild(cell);
        }
    }
}

        function loadPreset(name) {
            state = presets[name]();
            renderGrid();
        }

        function openModal() { modal.classList.add('active'); }
        function closeModal() { modal.classList.remove('active'); }
        function confirmClear() {
            state = Array.from({ length: 8 }, () => Array.from({ length: 8 }, () => ({ level: 0, color: 'u' })));
            renderGrid();
            closeModal();
        }

        function getHex(code) {
            const map = { r:'#e74c3c', g:'#2ecc71', b:'#3498db', y:'#f1c40f', o:'#e67e22', w:'#ffffff', k:'#666', u:'#444' };
            return map[code];
        }

        function exportToTxt() {
            let output = state.map(row => row.map(n => `${n.level}${n.color}`).join(',')).join('\n');
            const blob = new Blob([output], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'grid.txt'; a.click();
        }

        renderGrid();

        let port;
        let writer;



        async function connectAndSend() {
    let port;

    try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });

        const encoder = new TextEncoderStream();
        const writableStreamClosed = encoder.readable.pipeTo(port.writable);
        const writer = encoder.writable.getWriter();

        const decoder = new TextDecoderStream();
        const readableStreamClosed = port.readable.pipeTo(decoder.writable);
        const reader = decoder.readable.getReader();
        console.log("Going into the ready check");

        // Wait for READY signal
        let ready = false;
        while (!ready) {
           // Wait for READY
            await waitForKeyword(reader, "READY");
        }

        console.log("Made it passed the ready check");

         let fullData = state.map(row => 
        row.map(n => `${n.level}${n.color}`).join(',')
    ).join('\n');

        // Send config data
        await writer.write(fullData + '\n');

        // Wait for OK
        let confirmed = false;
        while (!confirmed) {
            const { value, done } = await reader.read();
            if (value && value.includes("OK")) {
                confirmed = true;
            }
        }

        // Clean shutdown (this is important)
        await writer.close();
        await reader.cancel();

        await writableStreamClosed.catch(() => {});
        await readableStreamClosed.catch(() => {});

        await port.close();

        console.log("Done and port released");

    } catch (err) {
        console.error(err);
    }
}


// The 'Sync' button still uses the original function
async function syncToESP32() {
    if (!writer) return;

    // This sends the ACTUAL levels (1g, 3r, etc.)
    let fullData = state.map(row => 
        row.map(n => `${n.level}${n.color}`).join(',')
    ).join('\n');

    await writer.write(fullData + "!");
    console.log("Full State (Levels + Colors) Synced!");
}

async function waitForKeyword(reader, keyword) {
    let buffer = "";
    console.log("Waiting for the keyword");

    while (true) {
        console.log(buffer);
        const { value, done } = await reader.read();
        if (done) throw new Error("Stream closed before receiving " + keyword);

        if (value) {
            buffer += value;

            // Split into lines
            const lines = buffer.split('\n');
            buffer = lines.pop(); // keep incomplete line

            for (let line of lines) {
                line = line.trim();
                console.log("RX:", line);

                if (line.includes(keyword)) {
                    return; // found it cleanly
                }
            }
        }
    }
}
    </script>
</body>
</html>
